version: "2"

run:
  timeout: 5m

linters:
  default: none
  enable:
    - govet
    - ineffassign
    - staticcheck
    - unused
  settings:
    staticcheck:
      checks:
        - all
        - -SA1019
        - -ST1000
  exclusions:
    generated: lax
    paths:
      - pkg/gen
      - services/.*/internal/gen