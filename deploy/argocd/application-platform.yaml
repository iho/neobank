apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: neobank-platform
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: neobank
  source:
    repoURL: https://github.com/iho/neobank.git
    targetRevision: main
    path: deploy/helm/platform
    helm:
      valueFiles:
        - values-production.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: neobank
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true