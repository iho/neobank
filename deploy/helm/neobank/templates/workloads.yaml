{{- range $name, $wl := .Values.workloads }}
{{- if $wl.enabled }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "neobank.fullname" $ }}-{{ $name }}
  labels:
    {{- include "neobank.labels" $ | nindent 4 }}
    app.kubernetes.io/component: {{ $name }}
spec:
  replicas: {{ $wl.replicaCount }}
  selector:
    matchLabels:
      {{- include "neobank.selectorLabels" $ | nindent 6 }}
      app.kubernetes.io/component: {{ $name }}
  template:
    metadata:
      labels:
        {{- include "neobank.selectorLabels" $ | nindent 8 }}
        app.kubernetes.io/component: {{ $name }}
    spec:
      serviceAccountName: {{ include "neobank.serviceAccountName" $ }}
      automountServiceAccountToken: {{ $.Values.serviceAccount.automountServiceAccountToken }}
      {{- with $.Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with (include "neobank.podSecurityContext" $) }}
      securityContext:
        {{- . | nindent 8 }}
      {{- end }}
      containers:
        - name: {{ $name }}
          image: {{ include "neobank.image" (dict "Values" $.Values "image" $wl.image "repository" "" "tag" "") }}
          imagePullPolicy: IfNotPresent
          {{- with (include "neobank.containerSecurityContext" $) }}
          securityContext:
            {{- . | nindent 12 }}
          {{- end }}
          ports:
            - name: http
              containerPort: {{ $wl.httpPort }}
            {{- if $wl.grpcPort }}
            - name: grpc
              containerPort: {{ $wl.grpcPort }}
            {{- end }}
          env:
            {{- include "neobank.env.workload" (dict "root" $ "name" $name "workload" $wl) | nindent 12 }}
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 3
          resources:
            {{- toYaml $wl.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "neobank.fullname" $ }}-{{ $name }}
  labels:
    {{- include "neobank.labels" $ | nindent 4 }}
    app.kubernetes.io/component: {{ $name }}
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: {{ $wl.httpPort | quote }}
    prometheus.io/path: "/metrics"
spec:
  type: ClusterIP
  selector:
    {{- include "neobank.selectorLabels" $ | nindent 4 }}
    app.kubernetes.io/component: {{ $name }}
  ports:
    - name: http
      port: {{ $wl.httpPort }}
      targetPort: http
    {{- if $wl.grpcPort }}
    - name: grpc
      port: {{ $wl.grpcPort }}
      targetPort: grpc
    {{- end }}
{{- if $wl.podDisruptionBudget.enabled }}
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ include "neobank.fullname" $ }}-{{ $name }}
  labels:
    {{- include "neobank.labels" $ | nindent 4 }}
    app.kubernetes.io/component: {{ $name }}
spec:
  minAvailable: {{ $wl.podDisruptionBudget.minAvailable }}
  selector:
    matchLabels:
      {{- include "neobank.selectorLabels" $ | nindent 6 }}
      app.kubernetes.io/component: {{ $name }}
{{- end }}
{{- if $wl.autoscaling.enabled }}
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ include "neobank.fullname" $ }}-{{ $name }}
  labels:
    {{- include "neobank.labels" $ | nindent 4 }}
    app.kubernetes.io/component: {{ $name }}
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ include "neobank.fullname" $ }}-{{ $name }}
  minReplicas: {{ $wl.autoscaling.minReplicas }}
  maxReplicas: {{ $wl.autoscaling.maxReplicas }}
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ $wl.autoscaling.targetCPUUtilizationPercentage }}
{{- end }}
{{- end }}
{{- end }}