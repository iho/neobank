# Staging overlay — single-replica, ingress on, policies relaxed.

config:
  appEnv: staging

ingress:
  enabled: true
  hosts:
    - host: api.staging.neobank.example.com
      paths:
        - path: /
          pathType: Prefix
  tls:
    enabled: true
  certManager:
    enabled: true
    issuer: letsencrypt-staging

workloads:
  gateway:
    replicaCount: 1
    autoscaling:
      enabled: false
  user:
    replicaCount: 1
  payment:
    replicaCount: 1
  card:
    replicaCount: 1
  notification:
    replicaCount: 1

networkPolicy:
  enabled: true