{{- if and .Values.cnpg.enabled .Values.cnpg.backup.enabled .Values.cnpg.backup.destinationPath }}
apiVersion: postgresql.cnpg.io/v1
kind: ScheduledBackup
metadata:
  name: {{ include "platform.cnpg.clusterName" . }}-backup
  namespace: {{ include "platform.namespace" . }}
  labels:
    {{- include "platform.labels" . | nindent 4 }}
spec:
  schedule: {{ .Values.cnpg.backup.schedule | quote }}
  backupOwnerReference: self
  cluster:
    name: {{ include "platform.cnpg.clusterName" . }}
  method: barmanObjectStore
  retentionPolicy: {{ .Values.cnpg.backup.retentionPolicy | quote }}
{{- end }}