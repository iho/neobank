{{- if and .Values.cnpg.enabled .Values.cnpg.password }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "platform.cnpg.clusterName" . }}-app
  namespace: {{ include "platform.namespace" . }}
  labels:
    {{- include "platform.labels" . | nindent 4 }}
    cnpg.io/cluster: {{ include "platform.cnpg.clusterName" . }}
type: kubernetes.io/basic-auth
stringData:
  username: {{ .Values.cnpg.owner | quote }}
  password: {{ .Values.cnpg.password | quote }}
{{- end }}