# Example production CNPG backup overlay — copy and fill before helm upgrade.
#
#   helm upgrade neobank-platform deploy/helm/platform \
#     -f deploy/helm/platform/values-production.yaml \
#     -f deploy/platform/cnpg-backup-values.example.yaml \
#     -n neobank
#
# Prerequisite: create the S3 credentials secret (or sync via ESO from Vault):
#
#   kubectl create secret generic neobank-postgres-backup-s3 -n neobank \
#     --from-literal=ACCESS_KEY_ID=REPLACE_ME \
#     --from-literal=SECRET_ACCESS_KEY=REPLACE_ME

cnpg:
  backup:
    enabled: true
    destinationPath: s3://neobank-postgres-backups/prod
    endpointURL: https://s3.amazonaws.com
    s3CredentialsSecret: neobank-postgres-backup-s3