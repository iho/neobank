# Optional goledger overlay — isolated ledger Postgres/Redis + in-network gRPC.
#
#   make up-ledger              # infra + goledger only
#   make up-all-ledger          # full neobank stack + goledger (LEDGER_GRPC_ADDR=goledger:50051)
#
# Builds goledger from GitHub (GOLEDGER_REF=main). Pin a tag for reproducibility:
#   GOLEDGER_REF=v1.2.3 make up-all-ledger

x-goledger-build: &goledger-build
  context: ..
  dockerfile: deployments/Dockerfile.goledger-init
  args:
    GOLEDGER_REF: ${GOLEDGER_REF:-main}

services:
  ledger-postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ledger
      POSTGRES_PASSWORD: ledger
      POSTGRES_DB: ledger
    volumes:
      - ledger_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ledger"]
      interval: 5s
      timeout: 5s
      retries: 8

  ledger-redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 8

  goledger-setup:
    build: *goledger-build
    entrypoint: ["/goledger-cli"]
    command:
      - setup
      - --database-url
      - postgres://ledger:ledger@ledger-postgres:5432/ledger?sslmode=disable
    depends_on:
      ledger-postgres:
        condition: service_healthy
    restart: "no"

  goledger:
    build: *goledger-build
    entrypoint: ["/goledger"]
    environment:
      DATABASE_URL: postgres://ledger:ledger@ledger-postgres:5432/ledger?sslmode=disable
      REDIS_URL: redis://ledger-redis:6379
      HTTP_PORT: "8080"
      GRPC_PORT: "50051"
      LOG_LEVEL: info
      LOG_FORMAT: json
      AUTH_ENABLED: "false"
    ports:
      - "50051:50051"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/health >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
    depends_on:
      goledger-setup:
        condition: service_completed_successfully
      ledger-postgres:
        condition: service_healthy
      ledger-redis:
        condition: service_healthy
    restart: unless-stopped

  # Point neobank services at in-compose goledger (overrides host.docker.internal).
  user:
    environment:
      LEDGER_GRPC_ADDR: goledger:50051
    depends_on:
      goledger:
        condition: service_healthy

  payment:
    environment:
      LEDGER_GRPC_ADDR: goledger:50051
    depends_on:
      goledger:
        condition: service_healthy

  card:
    environment:
      LEDGER_GRPC_ADDR: goledger:50051
    depends_on:
      goledger:
        condition: service_healthy

  gateway:
    extra_hosts: []

volumes:
  ledger_postgres_data: