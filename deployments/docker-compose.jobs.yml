# Scheduled reconciliation jobs. Requires Postgres, goledger, and the user gRPC service.
#
#   make up-all && make up-jobs
#
# goledger stays on the host (host.docker.internal:50051). User gRPC uses the
# in-compose service DNS when up-all is running.
services:
  reconcile-jobs:
    build:
      context: ..
      dockerfile: deployments/Dockerfile.jobs
    environment:
      DATABASE_URL: postgres://neobank:neobank@postgres:5432/neobank?sslmode=disable
      LEDGER_GRPC_ADDR: host.docker.internal:50051
      USER_GRPC_ADDR: user:50052
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      postgres:
        condition: service_healthy
      user:
        condition: service_healthy
    restart: unless-stopped