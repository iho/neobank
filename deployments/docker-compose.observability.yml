# Observability overlay: Tempo, Prometheus, Grafana, Loki, ops-metrics.
#
#   make up-observability          # infra + observability only
#   make up-obs-all                # full stack + observability
#
# Grafana: http://localhost:3000 (admin / admin)
# Prometheus: http://localhost:9090
# Tempo query: http://localhost:3200

services:
  otel-collector:
    volumes:
      - ./otel-collector-config.observability.yaml:/etc/otel-collector-config.yaml:ro

  tempo:
    image: grafana/tempo:2.7.2
    command: ["-config.file=/etc/tempo.yaml"]
    volumes:
      - ./tempo.yaml:/etc/tempo.yaml:ro
      - tempo_data:/var/tempo
    ports:
      - "3200:3200"
      - "4319:4317"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3200/ready"]
      interval: 10s
      timeout: 5s
      retries: 10

  prometheus:
    image: prom/prometheus:v3.2.1
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.enable-lifecycle
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    depends_on:
      - ops-metrics

  alertmanager:
    image: prom/alertmanager:v0.28.1
    command:
      - --config.file=/etc/alertmanager/alertmanager.yml
    volumes:
      - ./prometheus/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
    ports:
      - "9093:9093"

  loki:
    image: grafana/loki:3.4.2
    command: ["-config.file=/etc/loki/local-config.yaml"]
    ports:
      - "3100:3100"
    volumes:
      - loki_data:/loki

  promtail:
    image: grafana/promtail:3.4.2
    command: ["-config.file=/etc/promtail/config.yml"]
    volumes:
      - ./promtail-config.yaml:/etc/promtail/config.yml:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      - loki

  grafana:
    image: grafana/grafana:11.5.2
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
      - tempo
      - loki

  ops-metrics:
    build:
      context: ..
      dockerfile: deployments/Dockerfile.ops-metrics
    environment:
      DATABASE_URL: postgres://neobank:neobank@postgres:5432/neobank?sslmode=disable
      SCRAPE_INTERVAL: 30s
      HTTP_ADDR: :9091
    ports:
      - "9091:9091"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:9091/health >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  tempo_data:
  prometheus_data:
  loki_data:
  grafana_data: