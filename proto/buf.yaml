version: v2
modules:
  - path: .
    name: buf.build/iho/neobank
lint:
  use:
    - STANDARD
  except:
    # These services intentionally share response/request envelopes across
    # related RPCs (e.g. CardResponse for issue/get/update, EmptyResponse for
    # void mutations) instead of minting a distinct message per RPC.
    - RPC_REQUEST_RESPONSE_UNIQUE
    - RPC_REQUEST_STANDARD_NAME
    - RPC_RESPONSE_STANDARD_NAME
breaking:
  use:
    - FILE