  /v1/notifications/read-all:
    post:
      operationId: markAllNotificationsRead
      parameters:
        - $ref: "#/components/parameters/Authorization"
        - $ref: "#/components/parameters/XUserId"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MarkNotificationsReadResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "502":
          description: Bad Gateway
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /v1/notifications/{id}/read:
    post:
      operationId: markNotificationRead
      parameters:
        - $ref: "#/components/parameters/Authorization"
        - $ref: "#/components/parameters/XUserId"
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Notification"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Not Found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "502":
          description: Bad Gateway
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /v1/notifications:
    get:
      operationId: listNotifications
      parameters:
        - $ref: "#/components/parameters/Authorization"
        - $ref: "#/components/parameters/XUserId"
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NotificationList"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "502":
          description: Bad Gateway
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
components:
  parameters:
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: true
      schema:
        type: string
    Authorization:
      name: Authorization
      in: header
      schema:
        type: string
    XUserId:
      name: X-User-Id
      in: header
      schema:
        type: string
  schemas:
    HealthResponse:
      type: object
      required: [status, service]
      properties:
        status:
          type: string
        service:
          type: string
    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: string
    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
    RefreshTokenRequest:
      type: object
      required: [refresh_token]
      properties:
        refresh_token:
          type: string
    ChangePasswordRequest:
      type: object
      required: [current_password, new_password]
      properties:
        current_password:
          type: string
        new_password:
          type: string
          format: password
          minLength: 8
    LoginResponse:
      type: object
      required: [user_id, access_token, refresh_token]
      properties:
        user_id:
          type: string
        access_token:
          type: string
        refresh_token:
          type: string
    RegisterRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        phone:
          type: string
        password:
          type: string
    RegisterResponse:
      type: object
      required: [user_id, access_token, refresh_token]
      properties:
        user_id:
          type: string
        access_token:
          type: string
        refresh_token:
          type: string
    SubmitKYCRequest:
      type: object
      required: [full_name, date_of_birth, country_code]
      properties:
        full_name:
          type: string
        date_of_birth:
          type: string
          format: date
        country_code:
          type: string
          minLength: 2
          maxLength: 2
        document_type:
          type: string
        document_number:
          type: string
    SubmitKYCResponse:
      type: object
      required: [kyc_case_id, status, wallet_id]
      properties:
        kyc_case_id:
          type: string
        status:
          type: string
        wallet_id:
          type: string
    KYCStatusResponse:
      type: object
      required: [status]
      properties:
        status:
          type: string
        rejection_reason:
          type: string
    Profile:
      type: object
      required: [user_id, email, phone, status, kyc_status, created_at]
      properties:
        user_id:
          type: string
        email:
          type: string
        phone:
          type: string
        status:
          type: string
        full_name:
          type: string
        date_of_birth:
          type: string
          format: date
        country_code:
          type: string
        kyc_status:
          type: string
        created_at:
          type: string
          format: date-time
    WalletTransaction:
      type: object
      required: [id, type, amount, currency, direction, status, created_at]
      properties:
        id:
