  /v1/cards/{id}/unfreeze:
    post:
      operationId: unfreezeCard
      parameters:
        - $ref: "#/components/parameters/Authorization"
        - $ref: "#/components/parameters/XUserId"
        - name: id
          in: path
          required: true
