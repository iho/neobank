openapi: 3.0.3
info:
  title: User Service API
  version: 1.0.0
servers:
  - url: http://localhost:8081
paths:
  /health:
    get:
      operationId: getHealth
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
  /api/v1/auth/login:
    post:
      operationId: login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/v1/auth/refresh:
    post:
      operationId: refreshToken
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RefreshTokenRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/v1/auth/change-password:
    post:
      operationId: changePassword
      parameters:
        - $ref: "#/components/parameters/XUserId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChangePasswordRequest"
      responses:
        "204":
          description: Password updated
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/v1/auth/register:
    post:
      operationId: register
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RegisterResponse"
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/v1/me:
    get:
      operationId: getProfile
      parameters:
        - $ref: "#/components/parameters/XUserId"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Profile"
        "404":
          description: Not Found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/v1/kyc:
    post:
      operationId: submitKYC
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
        - $ref: "#/components/parameters/XUserId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SubmitKYCRequest"
      responses:
        "200":
          description: Approved (MVP auto-approve)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SubmitKYCResponse"
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/v1/kyc/status:
    get:
      operationId: getKYCStatus
      parameters:
        - $ref: "#/components/parameters/XUserId"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/KYCStatusResponse"
  /api/v1/devices:
    post:
      operationId: registerDeviceToken
      parameters:
        - $ref: "#/components/parameters/XUserId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterDeviceTokenRequest"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeviceToken"
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/v1/devices/{id}:
    delete:
      operationId: deleteDeviceToken
      parameters:
        - $ref: "#/components/parameters/XUserId"
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "204":
          description: Deleted
        "404":
          description: Not Found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/v1/account/close:
    post:
      operationId: closeAccount
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
        - $ref: "#/components/parameters/XUserId"
      responses:
        "204":
          description: Account closed
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/v1/payees:
    get:
      operationId: listPayees
      parameters:
        - $ref: "#/components/parameters/XUserId"
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PayeeList"
    post:
      operationId: createPayee
      parameters:
        - $ref: "#/components/parameters/XUserId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePayeeRequest"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Payee"
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/v1/payees/{id}:
    delete:
      operationId: deletePayee
      parameters:
        - $ref: "#/components/parameters/XUserId"
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "204":
          description: Deleted
        "404":
          description: Not Found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/v1/wallet/transactions:
    get:
      operationId: listWalletTransactions
      parameters:
        - $ref: "#/components/parameters/XUserId"
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
        - name: cursor
          in: query
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WalletTransactionList"
  /api/v1/internal/payees:
    post:
      operationId: upsertInternalPayee
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpsertInternalPayeeRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Payee"
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/v1/wallets/balance:
    get:
      operationId: getWalletBalance
      parameters:
        - $ref: "#/components/parameters/XUserId"
        - name: currency
          in: query
          schema:
            type: string
            default: USD
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WalletBalance"
        "404":
          description: Not Found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/v1/wallets/deposit:
    post:
      operationId: depositWallet
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
        - $ref: "#/components/parameters/XUserId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DepositWalletRequest"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DepositWalletResponse"
        "200":
          description: Idempotent replay
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DepositWalletResponse"
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/v1/wallets:
    post:
      operationId: provisionWallet
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
        - $ref: "#/components/parameters/XUserId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProvisionWalletRequest"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProvisionWalletResponse"
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/v1/internal/events:
    post:
      operationId: ingestEvent
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EventEnvelope"
      responses:
        "202":
          description: Accepted
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/v1/internal/users/by-email/{email}:
    get:
      operationId: getUserByEmail
      parameters:
        - name: email
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "404":
          description: Not Found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/v1/internal/users/{user_id}:
    get:
      operationId: getInternalUser
      parameters:
        - name: user_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "404":
          description: Not Found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/v1/internal/users/by-phone/{phone}:
    get:
      operationId: getUserByPhone
      parameters:
        - name: phone
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "404":
          description: Not Found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/v1/internal/users/{user_id}/device-tokens:
    get:
      operationId: listInternalDeviceTokens
      parameters:
        - name: user_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeviceTokenList"
  /api/v1/internal/users/{user_id}/gdpr/export:
    post:
      operationId: exportUserGDPR
      parameters:
        - name: user_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - $ref: "#/components/parameters/IdempotencyKey"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GDPRExportResponse"
        "404":
          description: Not Found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/v1/internal/users/{user_id}/gdpr/mask:
    post:
      operationId: maskUserGDPR
      parameters:
        - name: user_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - $ref: "#/components/parameters/IdempotencyKey"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GDPRMaskResponse"
        "404":
          description: Not Found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/v1/internal/wallets:
    get:
      operationId: getWallet
      parameters:
        - name: user_id
          in: query
          required: true
          schema:
            type: string
            format: uuid
        - name: currency
          in: query
          schema:
            type: string
            default: USD
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Wallet"
        "404":
          description: Not Found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
components:
  parameters:
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: true
      schema:
        type: string
    XUserId:
      name: X-User-Id
      in: header
      required: true
      schema:
        type: string
        format: uuid
  schemas:
    HealthResponse:
      type: object
      required: [status]
      properties:
        status:
          type: string
    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: string
    RegisterRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        phone:
          type: string
        password:
          type: string
          format: password
    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
    RefreshTokenRequest:
      type: object
      required: [refresh_token]
      properties:
        refresh_token:
          type: string
    ChangePasswordRequest:
      type: object
      required: [current_password, new_password]
      properties:
        current_password:
          type: string
        new_password:
          type: string
          format: password
          minLength: 8
    LoginResponse:
      type: object
      required: [user_id, access_token, refresh_token]
      properties:
        user_id:
          type: string
          format: uuid
        access_token:
          type: string
        refresh_token:
          type: string
    SubmitKYCRequest:
      type: object
      required: [full_name, date_of_birth, country_code]
      properties:
        full_name:
          type: string
        date_of_birth:
          type: string
          format: date
        country_code:
          type: string
          minLength: 2
          maxLength: 2
        document_type:
          type: string
          description: e.g. passport, national_id
        document_number:
          type: string
    SubmitKYCResponse:
      type: object
      required: [kyc_case_id, status]
      properties:
        kyc_case_id:
          type: string
          format: uuid
        status:
          type: string
        wallet_id:
          type: string
          format: uuid
        rejection_reason:
          type: string
    RegisterDeviceTokenRequest:
      type: object
      required: [platform, token]
      properties:
        platform:
          type: string
          enum: [ios, android, web]
        token:
          type: string
    DeviceToken:
      type: object
      required: [id, user_id, platform, token, created_at]
      properties:
        id:
          type: string
          format: uuid
        user_id:
          type: string
          format: uuid
        platform:
          type: string
        token:
          type: string
        created_at:
          type: string
          format: date-time
    DeviceTokenList:
      type: object
      required: [device_tokens]
      properties:
        device_tokens:
          type: array
          items:
            $ref: "#/components/schemas/DeviceToken"
    KYCStatusResponse:
      type: object
      required: [status]
      properties:
        status:
          type: string
        rejection_reason:
          type: string
    WalletBalance:
      type: object
      required: [wallet_id, currency, balance, available_balance]
      properties:
        wallet_id:
          type: string
          format: uuid
        ledger_account_id:
          type: string
        currency:
          type: string
        balance:
          type: string
        encumbered_balance:
          type: string
        available_balance:
          type: string
    RegisterResponse:
      type: object
      required: [user_id, access_token, refresh_token]
      properties:
        user_id:
          type: string
          format: uuid
        access_token:
          type: string
        refresh_token:
          type: string
    DepositWalletRequest:
      type: object
      required: [amount]
      properties:
        amount:
          type: string
        currency:
          type: string
          default: USD
    DepositWalletResponse:
      type: object
      required: [id, wallet_id, amount, currency, status]
      properties:
        id:
          type: string
          format: uuid
        wallet_id:
          type: string
          format: uuid
        amount:
          type: string
        currency:
          type: string
        ledger_transfer_id:
          type: string
        status:
          type: string
        created_at:
          type: string
          format: date-time
    ProvisionWalletRequest:
      type: object
      properties:
        user_id:
          type: string
          format: uuid
        currency:
          type: string
          default: USD
    ProvisionWalletResponse:
      type: object
      required: [wallet_id, ledger_account_id]
      properties:
        wallet_id:
          type: string
          format: uuid
        ledger_account_id:
          type: string
    Profile:
      type: object
      required: [user_id, email, phone, status, kyc_status, created_at]
      properties:
        user_id:
          type: string
          format: uuid
        email:
          type: string
        phone:
          type: string
        status:
          type: string
        full_name:
          type: string
        date_of_birth:
          type: string
          format: date
        country_code:
          type: string
        kyc_status:
          type: string
        created_at:
          type: string
          format: date-time
    User:
      type: object
      required: [id, email, phone, status]
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
        phone:
          type: string
        status:
          type: string
    Wallet:
      type: object
      required: [id, user_id, currency, ledger_account_id, status]
      properties:
        id:
          type: string
          format: uuid
        user_id:
          type: string
          format: uuid
        currency:
          type: string
        ledger_account_id:
          type: string
        status:
          type: string
    WalletTransaction:
      type: object
      required: [id, type, amount, currency, direction, status, created_at]
      properties:
        id:
          type: string
        type:
          type: string
        amount:
          type: string
        currency:
          type: string
        direction:
          type: string
        status:
          type: string
        counterparty:
          type: string
        memo:
          type: string
        reference_id:
          type: string
        created_at:
          type: string
          format: date-time
    WalletTransactionList:
      type: object
      required: [transactions]
      properties:
        transactions:
          type: array
          items:
            $ref: "#/components/schemas/WalletTransaction"
        next_cursor:
          type: string
    Payee:
      type: object
      required: [id, payee_user_id, last_used_at, created_at]
      properties:
        id:
          type: string
          format: uuid
        payee_user_id:
          type: string
          format: uuid
        nickname:
          type: string
        payee_email:
          type: string
        payee_phone:
          type: string
        last_used_at:
          type: string
          format: date-time
        created_at:
          type: string
          format: date-time
    PayeeList:
      type: object
      required: [payees]
      properties:
        payees:
          type: array
          items:
            $ref: "#/components/schemas/Payee"
    CreatePayeeRequest:
      type: object
      required: [payee_user_id]
      properties:
        payee_user_id:
          type: string
          format: uuid
        nickname:
          type: string
    UpsertInternalPayeeRequest:
      type: object
      required: [user_id, payee_user_id]
      properties:
        user_id:
          type: string
          format: uuid
        payee_user_id:
          type: string
          format: uuid
        nickname:
          type: string
    GDPRExportResponse:
      type: object
      required: [user_id, exported_at, profile, kyc_submissions, wallets, wallet_transaction_count]
      properties:
        user_id:
          type: string
          format: uuid
        exported_at:
          type: string
          format: date-time
        profile:
          $ref: "#/components/schemas/Profile"
        kyc_submissions:
          type: array
          items:
            $ref: "#/components/schemas/GDPRExportKYCSubmission"
        wallets:
          type: array
          items:
            $ref: "#/components/schemas/Wallet"
        wallet_transaction_count:
          type: integer
          format: int64
    GDPRExportKYCSubmission:
      type: object
      required: [id, kyc_case_id, provider, screening_decision, created_at]
      properties:
        id:
          type: string
          format: uuid
        kyc_case_id:
          type: string
          format: uuid
        document_type:
          type: string
        document_number:
          type: string
        provider:
          type: string
        screening_decision:
          type: string
        screening_reason:
          type: string
        created_at:
          type: string
          format: date-time
    GDPRMaskResponse:
      type: object
      required: [user_id, status]
      properties:
        user_id:
          type: string
          format: uuid
        status:
          type: string
    EventEnvelope:
      type: object
      required: [event_id, event_type, aggregate_type, aggregate_id, payload]
      properties:
        event_id:
          type: string
        event_type:
          type: string
        event_version:
          type: integer
        occurred_at:
          type: string
          format: date-time
        aggregate_type:
          type: string
        aggregate_id:
          type: string
        payload:
          type: object